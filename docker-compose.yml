# ═══════════════════════════════════════════════════════════════
#  AI Workspace — Self-Hosted Stack
#  Contabo VPS · Docker Compose · Zero paid SaaS
# ═══════════════════════════════════════════════════════════════
#
# Usage:
#   cp .env.example .env   # fill in secrets
#   docker compose up -d
#   docker exec ollama ollama pull llama3.1:8b-instruct-q4_K_M
#
# All service data persists under /data on the host.
# ═══════════════════════════════════════════════════════════════

name: workspace

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge
  advisory_edge:
    name: advisory_edge
    external: true
  advisorintel_edge:
    name: advisorintel_edge
    external: true

volumes:
  caddy_data:
  caddy_config:

services:

  # ─── Reverse proxy + auto TLS ─────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      APP_HOST: ${APP_HOST}
      API_HOST: ${API_HOST}
      FILES_HOST: ${FILES_HOST}
      DAV_HOST: ${DAV_HOST}
      STATUS_HOST: ${STATUS_HOST}
      LOGS_HOST: ${LOGS_HOST}
      ADVISOROS_HOST: ${ADVISOROS_HOST}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/advisoros/frontend/dist:/var/www/advisoros:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [edge, advisory_edge, advisorintel_edge]
    depends_on: [web, api]
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.5'

  # ─── Database ─────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    volumes:
      - /data/postgres:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'

  # ─── Cache + queue ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --appendonly yes --loglevel warning --requirepass ${REDIS_PASSWORD}
    volumes:
      - /data/redis:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  # ─── Object storage (S3-compatible) ───────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - /data/minio:/data
    networks: [internal, edge]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  # ─── Search ───────────────────────────────────────────────────
  meili:
    image: getmeili/meilisearch:v1.10
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_KEY}
      MEILI_ENV: production
    volumes:
      - /data/meili:/meili_data
    networks: [internal]
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  # ─── Local LLM ────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: "30m"
      OLLAMA_NUM_PARALLEL: "2"
      OLLAMA_MAX_LOADED_MODELS: "2"
    volumes:
      - /data/ollama:/root/.ollama
    networks: [internal]
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: '4.0'
    # Uncomment below if the VPS has an NVIDIA GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ─── Speech-to-text ───────────────────────────────────────────
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    restart: unless-stopped
    environment:
      WHISPER__MODEL: Systran/faster-whisper-base.en
      WHISPER__INFERENCE_DEVICE: cpu
      WHISPER__COMPUTE_TYPE: int8
    volumes:
      - /data/whisper:/root/.cache/huggingface
    networks: [internal]
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '2.0'

  # ─── Text-to-speech (HTTP API wrapping piper-tts) ──────────────
  piper:
    build:
      context: ./apps/piper-http
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PIPER_VOICE: en_US-lessac-medium
      PIPER_MODEL_DIR: /data
      PORT: "5000"
    volumes:
      - /data/piper:/data
    networks: [internal]
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '1.0'

  # ─── CalDAV / CardDAV ─────────────────────────────────────────
  radicale:
    image: tomsquest/docker-radicale:latest
    restart: unless-stopped
    volumes:
      - /data/radicale:/data
      - ./radicale/config:/config/config:ro
    networks: [internal, edge]
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.2'

  # ─── Client Portal (public, restricted DB role) ───────────────
  portal:
    build:
      context: ./apps/portal
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4100"
      DATABASE_URL: postgres://portal_reader:${PORTAL_DB_PASSWORD}@postgres:5432/${PG_DB}
      CORS_ORIGIN: https://${APP_HOST}
    networks: [internal, edge]
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  # ─── API ──────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4000"
      MIGRATIONS_DIR: /app/db/migrations
      DATABASE_URL: postgres://${PG_USER}:${PG_PASSWORD}@postgres:5432/${PG_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_USER}
      S3_SECRET_KEY: ${MINIO_PASSWORD}
      S3_BUCKET: workspace
      MEILI_HOST: http://meili:7700
      MEILI_KEY: ${MEILI_KEY}
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:3b
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: llama-3.1-8b-instant
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      WHISPER_HOST: http://whisper:8000
      PIPER_HOST: http://piper:5000
      CALDAV_HOST: http://radicale:5232
      CALDAV_USER: ${CALDAV_USER}
      CALDAV_PASS: ${CALDAV_PASS}
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      APP_URL: https://${APP_HOST}
      API_URL: https://${API_HOST}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      ALLOWED_DOMAINS: ${ALLOWED_DOMAINS:-}
    volumes:
      - /data/api-uploads:/tmp/uploads
      - ./db/migrations:/app/db/migrations:ro
    networks: [internal, edge]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  # ─── Web (Next.js) ────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${API_HOST}
        NEXT_PUBLIC_APP_URL: https://${APP_HOST}
        NEXT_PUBLIC_VAPID_KEY: ${VAPID_PUBLIC_KEY:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_API_URL: https://${API_HOST}
      NEXT_PUBLIC_VAPID_KEY: ${VAPID_PUBLIC_KEY:-}
    networks: [edge]
    depends_on: [api]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  # ─── Background workers ───────────────────────────────────────
  workers:
    build:
      context: ./apps/workers
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${PG_USER}:${PG_PASSWORD}@postgres:5432/${PG_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_USER}
      S3_SECRET_KEY: ${MINIO_PASSWORD}
      S3_BUCKET: workspace
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:3b
      MEILI_HOST: http://meili:7700
      MEILI_KEY: ${MEILI_KEY}
      CALDAV_HOST: http://radicale:5232
      CALDAV_USER: ${CALDAV_USER}
      CALDAV_PASS: ${CALDAV_PASS}
      JWT_SECRET: ${JWT_SECRET}
      DOMAIN: ${DOMAIN}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      APP_URL: https://${APP_HOST}
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  # ─── Monitoring ───────────────────────────────────────────────
  uptime:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - /data/uptime:/app/data
    networks: [edge]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  dozzle:
    image: amir20/dozzle:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [edge]
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.3'
